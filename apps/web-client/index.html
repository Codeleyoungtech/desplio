<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Desplio Preview</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --line: #2b3440;
        --text: #e6edf3;
        --muted: #93a1b2;
        --accent: #3fb950;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(63, 185, 80, 0.12), transparent 30%),
          linear-gradient(180deg, #0d1117 0%, #0b1016 100%);
        color: var(--text);
      }

      main {
        width: min(1100px, calc(100vw - 32px));
        margin: 32px auto;
      }

      .hero {
        margin-bottom: 24px;
      }

      .eyebrow {
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 12px;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        max-width: 60ch;
      }

      .grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }

      .card {
        background: rgba(22, 27, 34, 0.92);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 16px 60px rgba(0, 0, 0, 0.28);
      }

      .preview-frame {
        width: 100%;
        border-radius: 14px;
        background: #000;
        display: block;
        aspect-ratio: 16 / 10;
        object-fit: contain;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--muted);
        margin: 0;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      button,
      a {
        appearance: none;
        border: 1px solid var(--line);
        color: var(--text);
        background: #1b2330;
        border-radius: 999px;
        padding: 10px 14px;
        text-decoration: none;
        cursor: pointer;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">Desplio M3 Rolling Preview</div>
        <h1>Local Preview Receiver</h1>
        <p class="sub">
          This page follows the latest H.264 preview artifact produced by the daemon and refreshes it automatically.
        </p>
      </section>

      <section class="grid">
        <div class="card">
          <img id="player" class="preview-frame" alt="Latest Desplio preview frame" src="/latest-frame.png" />
          <div class="actions">
            <button id="reload">Refresh Now</button>
            <a href="/latest-frame.png" target="_blank" rel="noreferrer">Open Latest Frame</a>
            <a href="/latest.mp4" target="_blank" rel="noreferrer">Open Latest Segment</a>
          </div>
        </div>

        <div class="card">
          <h2>Status</h2>
          <pre id="status">Loading...</pre>
        </div>
      </section>
    </main>

    <script>
      const player = document.getElementById("player");
      const status = document.getElementById("status");
      const reloadButton = document.getElementById("reload");
      let lastLoadedAt = 0;

      async function refreshStatus() {
        try {
          const response = await fetch("/status.txt", { cache: "no-store" });
          status.textContent = await response.text();
        } catch (error) {
          status.textContent = String(error);
        }
      }

      function reloadPreviewFrame() {
        lastLoadedAt = Date.now();
        player.src = `/latest-frame.png?ts=${Date.now()}`;
      }

      reloadButton.addEventListener("click", reloadPreviewFrame);
      reloadPreviewFrame();
      refreshStatus();
      setInterval(refreshStatus, 2000);
      setInterval(() => {
        if (Date.now() - lastLoadedAt >= 2500) {
          reloadPreviewFrame();
        }
      }, 2500);
    </script>
  </body>
</html>
